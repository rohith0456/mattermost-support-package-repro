version: 2

project_name: mm-repro

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/mm-repro/
    binary: mm-repro
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/rohith0456/mattermost-support-package-repro/pkg/version.Version={{.Version}}
      - -X github.com/rohith0456/mattermost-support-package-repro/pkg/version.Commit={{.Commit}}
      - -X github.com/rohith0456/mattermost-support-package-repro/pkg/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - RELEASE_NOTES.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: mattermost
    name: mattermost-support-package-repro
  draft: false
  prerelease: auto
  name_template: "mm-repro {{.Tag}}"
  footer: |
    ## Quick Install

    **macOS / Linux (pre-built binary):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/rohith0456/mattermost-support-package-repro/main/scripts/install.sh | bash
    ```

    **Go install (builds from source):**
    ```bash
    go install github.com/rohith0456/mattermost-support-package-repro/cmd/mm-repro@{{.Tag}}
    ```

    **Docker Desktop required.** Run `mm-repro doctor` after install.
